# =============================================================================
# AirAd CI — Core Checks
# =============================================================================
# Runs on every push and PR. All deploy workflows depend on this passing.
# Jobs are parallelized for speed; results cached aggressively.
# =============================================================================

name: AirAd CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

# ---------------------------------------------------------------------------
# Shared CI environment block (YAML anchor for backend jobs)
# ---------------------------------------------------------------------------
# NOTE: YAML anchors are NOT supported in GitHub Actions. We repeat env
# blocks explicitly per job for clarity. All values are CI-only test values.

jobs:
  # =========================================================================
  # LAYER 1 — Parallel fast checks (no DB required)
  # =========================================================================

  # -------------------------------------------------------------------------
  # 1a. Python lint — flake8, isort, black
  # -------------------------------------------------------------------------
  backend-lint:
    name: "Backend Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airaad/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: airaad/backend/requirements/base.txt

      - name: Install lint tools
        run: pip install flake8 isort black

      - name: flake8
        run: flake8 apps/ core/ config/ celery_app.py --max-line-length=88 --extend-ignore=E203,W503

      - name: isort — import order
        run: isort --check-only --diff apps/ core/ config/ celery_app.py

      - name: black — code formatting
        run: black --check --diff apps/ core/ config/ celery_app.py

  # -------------------------------------------------------------------------
  # 1b. Frontend lint — ESLint + TypeScript type check
  # -------------------------------------------------------------------------
  frontend-lint:
    name: "Frontend Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airaad/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: airaad/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint — zero warnings allowed
        run: npm run lint

      - name: TypeScript — type check
        run: npx tsc --noEmit

  # -------------------------------------------------------------------------
  # 1c. Backend security — bandit + safety
  # -------------------------------------------------------------------------
  backend-security:
    name: "Backend Security Scan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airaad/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: airaad/backend/requirements/base.txt

      - name: Install security tools
        run: pip install bandit safety

      - name: bandit — static security analysis
        run: bandit -r apps/ core/ -ll --format txt

      - name: safety — dependency vulnerability check
        run: safety check -r requirements/production.txt
        continue-on-error: true

  # -------------------------------------------------------------------------
  # 1d. Frontend security — npm audit
  # -------------------------------------------------------------------------
  frontend-security:
    name: "Frontend Security Scan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airaad/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: airaad/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit — dependency vulnerability check
        run: npm audit --audit-level=high
        continue-on-error: true

  # -------------------------------------------------------------------------
  # 1e. Secret scanning — TruffleHog (runs on ALL pushes + PRs)
  # -------------------------------------------------------------------------
  secret-scan:
    name: "Secret Scan (TruffleHog)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog — scan for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # =========================================================================
  # LAYER 2 — Database-dependent checks (parallel with each other)
  # =========================================================================

  # -------------------------------------------------------------------------
  # 2a. Migration safety — verify all migrations can apply cleanly
  # -------------------------------------------------------------------------
  migration-check:
    name: "Migration Safety Check"
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: airaad/backend
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_DB: test_airaad_db
          POSTGRES_USER: airaad
          POSTGRES_PASSWORD: airaad
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENCRYPTION_KEY: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
      DATABASE_URL: postgis://airaad:airaad@localhost:5432/test_airaad_db
      REDIS_URL: redis://localhost:6379/0
      AWS_ACCESS_KEY_ID: test-key
      AWS_SECRET_ACCESS_KEY: test-secret
      AWS_STORAGE_BUCKET_NAME: test-bucket
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: airaad/backend/requirements/test.txt

      - name: Install GDAL
        run: sudo apt-get update && sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install dependencies
        run: pip install -r requirements/test.txt

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Verify migrations apply cleanly
        run: python manage.py migrate --noinput

      - name: Verify migrations are reversible (safety check)
        run: python manage.py showmigrations --list

  # -------------------------------------------------------------------------
  # 2b. Backend test suite — ≥80% coverage gate
  # -------------------------------------------------------------------------
  backend-test:
    name: "Backend Tests (≥80% coverage)"
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: airaad/backend
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_DB: test_airaad_db
          POSTGRES_USER: airaad
          POSTGRES_PASSWORD: airaad
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENCRYPTION_KEY: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
      DATABASE_URL: postgis://airaad:airaad@localhost:5432/test_airaad_db
      REDIS_URL: redis://localhost:6379/0
      AWS_ACCESS_KEY_ID: test-key
      AWS_SECRET_ACCESS_KEY: test-secret
      AWS_STORAGE_BUCKET_NAME: test-bucket
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: airaad/backend/requirements/test.txt

      - name: Install GDAL
        run: sudo apt-get update && sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install dependencies
        run: pip install -r requirements/test.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests with coverage gate
        run: pytest --cov=. --cov-fail-under=80 --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: airaad/backend/coverage.xml
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: airaad/backend/coverage.xml
          fail_ci_if_error: false

  # -------------------------------------------------------------------------
  # 2c. RBAC tests — verify role permissions are correct
  # -------------------------------------------------------------------------
  rbac-test:
    name: "RBAC Permission Tests"
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: airaad/backend
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_DB: test_airaad_db
          POSTGRES_USER: airaad
          POSTGRES_PASSWORD: airaad
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENCRYPTION_KEY: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
      DATABASE_URL: postgis://airaad:airaad@localhost:5432/test_airaad_db
      REDIS_URL: redis://localhost:6379/0
      AWS_ACCESS_KEY_ID: test-key
      AWS_SECRET_ACCESS_KEY: test-secret
      AWS_STORAGE_BUCKET_NAME: test-bucket
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: airaad/backend/requirements/test.txt

      - name: Install GDAL
        run: sudo apt-get update && sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install dependencies
        run: pip install -r requirements/test.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run RBAC/permission tests
        run: pytest tests/test_rbac.py -v --no-cov --tb=short

  # -------------------------------------------------------------------------
  # 2d. Frontend build — Vite production build
  # -------------------------------------------------------------------------
  frontend-build:
    name: "Frontend Build"
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: airaad/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: airaad/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000

      - name: Verify dist output exists
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "❌ Build produced empty dist directory"
            exit 1
          fi
          echo "✅ dist/ contains $(find dist -type f | wc -l) files"

  # =========================================================================
  # LAYER 3 — Integration & E2E tests (depend on Layer 2)
  # =========================================================================

  # -------------------------------------------------------------------------
  # 3a. Backend Docker build — verify image builds successfully
  # -------------------------------------------------------------------------
  backend-docker:
    name: "Backend Docker Build"
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image (with cache)
        uses: docker/build-push-action@v5
        with:
          context: ./airaad/backend
          target: production
          push: false
          tags: airaad-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # 3b. Backend E2E tests — full user journey flows
  # -------------------------------------------------------------------------
  backend-e2e:
    name: "Backend E2E Tests"
    runs-on: ubuntu-latest
    needs: [backend-test]
    defaults:
      run:
        working-directory: airaad/backend
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_DB: test_airaad_db
          POSTGRES_USER: airaad
          POSTGRES_PASSWORD: airaad
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENCRYPTION_KEY: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
      DATABASE_URL: postgis://airaad:airaad@localhost:5432/test_airaad_db
      REDIS_URL: redis://localhost:6379/0
      AWS_ACCESS_KEY_ID: test-key
      AWS_SECRET_ACCESS_KEY: test-secret
      AWS_STORAGE_BUCKET_NAME: test-bucket
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: airaad/backend/requirements/test.txt

      - name: Install GDAL
        run: sudo apt-get update && sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install dependencies
        run: pip install -r requirements/test.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run E2E journey tests
        run: |
          pytest tests/e2e/ \
            --tb=short \
            -v \
            --no-cov \
            -m "integration" \
            --junit-xml=e2e-results.xml

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-e2e-results
          path: airaad/backend/e2e-results.xml
          retention-days: 7

  # -------------------------------------------------------------------------
  # 3c. Frontend E2E tests — Playwright
  # -------------------------------------------------------------------------
  frontend-e2e:
    name: "Frontend E2E Tests (Playwright)"
    runs-on: ubuntu-latest
    needs: [frontend-build]
    defaults:
      run:
        working-directory: airaad/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: airaad/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('airaad/frontend/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          VITE_API_BASE_URL: http://localhost:8000
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: airaad/frontend/playwright-report/
          retention-days: 7

  # =========================================================================
  # LAYER 4 — PR-only: Semgrep + AI review + quality gate
  # =========================================================================

  # -------------------------------------------------------------------------
  # 4a. Semgrep — static analysis (Python + TypeScript)
  # -------------------------------------------------------------------------
  semgrep:
    name: "Semgrep Static Analysis"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (project + community rules)
        run: |
          semgrep scan \
            --config airaad/.semgrep.yml \
            --config p/django \
            --config p/python \
            --config p/react \
            --config p/typescript \
            --config p/owasp-top-ten \
            --json \
            --output semgrep-results.json \
            airaad/
        continue-on-error: true

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 7

  # -------------------------------------------------------------------------
  # 4b. AI Code Review — Claude + Semgrep orchestrator
  # -------------------------------------------------------------------------
  ai-review:
    name: "AI Code Review"
    runs-on: ubuntu-latest
    needs: [semgrep]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install anthropic>=0.25.0 requests>=2.31.0

      - name: Download Semgrep results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
          path: .

      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python airaad/scripts/ai_review.py \
            --pr-number ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --semgrep-results semgrep-results.json \
            --output review-comments.json
        continue-on-error: true

      - name: Upload review comments
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: review-comments
          path: review-comments.json
          retention-days: 7

  # -------------------------------------------------------------------------
  # 4c. Quality gate — blocks merge on CRITICAL findings
  # -------------------------------------------------------------------------
  quality-gate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    needs: [backend-test, rbac-test, frontend-build, backend-e2e, frontend-e2e, secret-scan]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download review comments
        uses: actions/download-artifact@v4
        with:
          name: review-comments
          path: .
        continue-on-error: true

      - name: Evaluate quality gate
        run: |
          python3 - <<'EOF'
          import json, sys, os

          path = "review-comments.json"
          if not os.path.exists(path):
              print("No review-comments.json — quality gate PASSED (no findings)")
              sys.exit(0)

          with open(path) as f:
              issues = json.load(f)

          critical = [i for i in issues if i.get("severity") == "CRITICAL"]
          high     = [i for i in issues if i.get("severity") == "HIGH"]

          print(f"Total findings : {len(issues)}")
          print(f"  CRITICAL     : {len(critical)}")
          print(f"  HIGH         : {len(high)}")

          if critical:
              print("\n❌ Quality gate FAILED — CRITICAL issues must be resolved:")
              for i in critical:
                  print(f"  [{i['file_path']}:{i['line']}] {i['title']}")
              sys.exit(1)

          print("\n✅ Quality gate PASSED")
          sys.exit(0)
          EOF
