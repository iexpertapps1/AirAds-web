# =============================================================================
# AirAd — Nginx Development Configuration
# =============================================================================
# Used with docker-compose.dev.yml override.
# /api/  → backend:8000  (Django runserver)
# /      → frontend:3000 (Vite dev server with HMR)
# =============================================================================

worker_processes 1;
error_log /var/log/nginx/error.log debug;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    upstream backend {
        server backend:8000;
    }

    upstream frontend_dev {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # API → Django runserver
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Frontend → Vite dev server (supports HMR WebSocket)
        location / {
            proxy_pass http://frontend_dev;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }
}
