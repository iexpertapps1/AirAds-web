# =============================================================================
# AirAd — Nginx Reverse Proxy Configuration
# =============================================================================
# /api/  → backend:8000  (Django/Gunicorn)
# /      → frontend:80   (React SPA served by nginx:alpine)
#
# Backend is NOT directly port-exposed — all traffic routes through here.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'request_id=$http_x_request_id';

    access_log /var/log/nginx/access.log main;

    # ---------------------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # ---------------------------------------------------------------------------
    # Gzip compression
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ---------------------------------------------------------------------------
    # Upstream definitions
    # ---------------------------------------------------------------------------
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # ---------------------------------------------------------------------------
    # Main server block
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Propagate request ID to upstream services
        proxy_set_header X-Request-ID $request_id;

        # -----------------------------------------------------------------------
        # API — proxy to Django backend (Gunicorn on port 8000)
        # -----------------------------------------------------------------------
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts — generous for long CSV import uploads
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 16 8k;
        }

        # -----------------------------------------------------------------------
        # Frontend — proxy to React app (nginx:alpine on port 80)
        # SPA fallback: all non-API routes serve index.html
        # -----------------------------------------------------------------------
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # -----------------------------------------------------------------------
        # Health check endpoint for load balancer / container orchestration
        # -----------------------------------------------------------------------
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
